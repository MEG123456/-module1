<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입2</title>
</head>
<body>
    <div class="signup-page">
        <div class="signup-layout">

            <!-- 마스코트 -->
            <img src="../asset/mascot.png" class="signup-logo">

            <div class="signup-box">
                <!-- 진행바 -->
                <div class="signup-progress-bar">
                    <div class="signup-progress-fill"></div>
                </div>

                <!-- 제목 -->
                <h2 class="signup-title">가입을 위한 정보를 입력해 주세요</h2>

                <form>
                    <!-- 학부 -->
                    <div class="signup-row">
                        <label class="signup-label">학부</label>
                        <div class="signup-field-group">
                            <select required>
                                <option value="">선택</option>
                                <option>첨단학부</option>
                                <option>자연계열학부</option>
                                <option>인문사회계열학부</option>
                            </select>
                            <p class="error-message">학부를 선택해 주세요</p>
                        </div>
                    </div>

                    <!-- 학과 -->
                    <div class="signup-row">
                        <label class="signup-label">학과</label>
                        <div class="signup-field-group">
                            <select required>
                                <option value="">선택</option>
                                <option>빅데이터인공지능학과</option>
                                <option>글로벌AI학과</option>
                            </select>
                            <p class="error-message">학과를 선택해 주세요</p>
                        </div>
                    </div>

                    <!-- 학년 -->
                    <div class="signup-row">
                        <label class="signup-label">학년</label>
                        <div class="signup-field-group">
                            <select required>
                                <option value="">선택</option>
                                <option>1학년</option>
                                <option>2학년</option>
                                <option>3학년</option>
                                <option>4학년</option>
                            </select>
                            <p class="error-message">학년을 선택해 주세요</p>
                        </div>
                    </div>

                    <!-- 학번 -->
                    <div class="signup-row">
                        <label class="signup-label">학번</label>
                        <div class="signup-field-group">
                            <input type="text" required pattern="\d{10}" placeholder="20XXXXXXXX">
                            <p class="error-message">학번을 다시 확인해 주세요</p>
                        </div>
                    </div>

                    <!-- 버튼 -->
                    <div class="signup-button-row">
                        <button type="submit" class="signup-next-button">></button>
                    </div>
                </form>

            </div>
        </div>
    </div>
</body>
</html>
