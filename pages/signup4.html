<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입 4</title>
    <link rel="stylesheet" href="/src/css/ui/module/signup.css"/>
    <link rel="stylesheet" href="/src/css/pages/signup4.css">
</head>
<body>
    <div class="signup-container">

        <div class="logo">
            <img src="/asset/logo5.png">
        </div>

        <div class="signup-box">

            <div class="progress-bar">
                <div class="progress-fill step3"></div>
            </div>

            <h2 class="signup-title">가입을 위한 정보를 입력해 주세요</h2>

            <div class="signup-content">
                <div class="form">
                    <label>아이디</label>
                    <div class="input-wrap">
                        <input type="text" id="id" placeholder="아이디를 입력해 주세요">
                        <div class="error-message" id="id-error"></div>
                    </div>
                </div>

            <div class="form">
                <label>비밀번호</label>
                <div class="input-wrap">
                    <input type="password" id="password" placeholder="비밀번호를 입력해 주세요">
                    <div class="error-message" id="pwd-error"></div>
                </div>
            </div>
            

            <div class="form">
                <label>비밀번호 확인</label>
                <div class="input-wrap">
                    <input type="password" id="pwd-check" placeholder="비밀번호를 다시 입력해 주세요">
                    <div class="error-message" id="pwd-check-error"></div>
                    <img src="/asset/eyesclose.svg" class="toggle-pwd" id="togglePwd">
                </div>
            </div>
            
            

            <div class="signup-footer">
                <button class="next-btn">다음</button>
            </div>

        </div>

    </div>

</div>
<script src="/src/js/pages/signup4.js"></script>
</body>
</html>
