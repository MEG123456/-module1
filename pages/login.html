<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인</title>
    <link rel="stylesheet" href="/src/css/pages/login.css"/>
</head>
<body>
    <div class="top-logo">
        <img src="/asset/logo.png" alt="로그인 로고" />
    </div>
    <div class="box">
        <h2> 로그인 </h2>

        <label for="userid">아이디</label>
        <input type="text" id="userid" name="userid" placeholder="아이디를 입력해 주세요"/>
        <div class="error-message" id="userid-error"></div>

        <label for="userpwd">비밀번호</label>
        <input type="password" id="userpwd" name="userpwd" placeholder="비밀번호를 입력해 주세요">

        <div class="error-message" id="password-error"></div>
    </div>

    <div class="bottom-area">
        <button id="loginBtn">로그인</button>
        <p>계정이 없으신가요? <a href="signup.html">회원가입</a></p>
    </div>

    <script src="/src/js/pages/login.js"></script>
</body>
</html>
