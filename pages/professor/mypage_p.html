<!DOCTYPE html>

                            </tr>
                            <tr>
                            <td>6</td>
                            <td></td><td></td><td></td><td></td><td></td>
                            </tr>
                            <tr>
                            <td>7</td>
                            <td></td><td></td><td></td><td></td><td></td>
                            </tr>
                        </tbody>
                    </table>
                </div>

            </div>

                    <div class="card-header">
                        <span>강의목록</span>
                        <a href="/pages/professor/myLecMane.html">
                        <img src="/asset/plus.svg" class="plus-btn">

                    </div>

                <div class="card notice-card">
                    <div class="card-header">
                        <span>공지사항</span>
                        <img src="/asset/plus.svg" class="plus-btn">
